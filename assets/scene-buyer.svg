<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <defs>
    <radialGradient id="bGlow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3f6dd"/>
    </radialGradient>
  </defs>
  <!-- full bleed background -->
  <rect width="400" height="320" fill="url(#bGlow)"/>
  <circle cx="320" cy="70" r="120" fill="#edf3eb" opacity="0.7"/>
  <circle cx="70" cy="250" r="90" fill="#e8efe6" opacity="0.6"/>

  <!-- floating produce icons -->
  <g opacity="0.95">
    <!-- tomato -->
    <circle cx="64" cy="78" r="20" fill="#e2563b"/>
    <path d="M52 64 q12 -8 24 0 q-8 6 -12 6 q-4 0 -12 -6 z" fill="#1f9e4e"/>
    <!-- leaf -->
    <path d="M330 110 q26 -22 50 -8 q-10 28 -42 24 q-12 -2 -8 -16 z" fill="#46c138"/>
    <path d="M340 116 q18 -10 34 -8" stroke="#1f9e4e" stroke-width="2" fill="none"/>
    <!-- carrot -->
    <g transform="translate(338,210) rotate(20)">
      <path d="M0 0 L14 6 L4 44 Z" fill="#e8843c"/>
      <path d="M-2 -2 l6 -12 M4 -2 l2 -14 M10 0 l10 -10" stroke="#46c138" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- counter -->
  <rect x="0" y="250" width="400" height="70" fill="#dce6d9"/>
  <rect x="0" y="250" width="400" height="10" fill="#cfe0c8"/>

  <!-- person -->
  <g>
    <!-- head -->
    <circle cx="150" cy="120" r="26" fill="#f0c9a8"/>
    <path d="M124 116 q0 -30 26 -30 q26 0 26 30 q-10 -14 -26 -14 q-16 0 -26 14 z" fill="#15231b"/>
    <!-- body / apron -->
    <path d="M112 250 q-2 -70 38 -78 q40 8 38 78 z" fill="#46c138"/>
    <path d="M132 250 l0 -54 q18 -10 36 0 l0 54 z" fill="#1f9e4e"/>
    <rect x="146" y="186" width="8" height="40" rx="3" fill="#e3f6dd"/>
    <!-- arm to tablet -->
    <path d="M186 196 q34 6 44 30" stroke="#f0c9a8" stroke-width="13" fill="none" stroke-linecap="round"/>
  </g>

  <!-- tablet -->
  <g transform="translate(214,196) rotate(-8)">
    <rect x="0" y="0" width="98" height="118" rx="12" fill="#15231b"/>
    <rect x="7" y="9" width="84" height="100" rx="6" fill="#ffffff"/>
    <rect x="14" y="18" width="48" height="9" rx="4" fill="#1f9e4e"/>
    <!-- list rows -->
    <circle cx="20" cy="44" r="5" fill="#46c138"/>
    <rect x="32" y="40" width="50" height="8" rx="4" fill="#e8efe6"/>
    <circle cx="20" cy="64" r="5" fill="#46c138"/>
    <rect x="32" y="60" width="44" height="8" rx="4" fill="#e8efe6"/>
    <circle cx="20" cy="84" r="5" fill="#bff0b2"/>
    <rect x="32" y="80" width="38" height="8" rx="4" fill="#edf3eb"/>
    <!-- order button -->
    <rect x="14" y="96" width="70" height="9" rx="4.5" fill="#46c138"/>
  </g>
</svg>

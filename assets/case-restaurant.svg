  <rect x="245" y="136" width="34" height="8" rx="4" fill="#bff0b2"/>

  <!-- counter inside right window -->
  <rect x="300" y="148" width="100" height="84" rx="6" fill="#e8efe6"/>
  <!-- chef figure -->
  <g transform="translate(330,150)">
    <ellipse cx="22" cy="6" rx="16" ry="10" fill="#ffffff"/>
    <rect x="6" y="10" width="32" height="8" fill="#ffffff"/>
    <circle cx="22" cy="26" r="13" fill="#f0c9a8"/>
    <path d="M6 70 q-2 -32 16 -38 q18 6 16 38 z" fill="#ffffff"/>
    <rect x="14" y="44" width="16" height="26" fill="#46c138"/>
  </g>

  <!-- plates / bowls on counter ledge -->
  <ellipse cx="120" cy="252" rx="26" ry="9" fill="#ffffff"/>
  <ellipse cx="120" cy="248" rx="20" ry="7" fill="#7cf06b"/>
  <ellipse cx="120" cy="247" rx="9" ry="4" fill="#1f9e4e"/>

  <ellipse cx="200" cy="256" rx="30" ry="10" fill="#ffffff"/>
  <ellipse cx="200" cy="251" rx="22" ry="8" fill="#bff0b2"/>
  <circle cx="194" cy="249" r="5" fill="#e2563b"/>
  <circle cx="206" cy="250" r="5" fill="#e8843c"/>
  <circle cx="200" cy="247" r="5" fill="#f4b740"/>

  <!-- bowl with steam -->
  <path d="M300 252 q24 22 56 0 z" fill="#ffffff"/>
  <path d="M306 250 q22 16 44 0 z" fill="#46c138"/>
  <path d="M318 238 q-6 -8 0 -16 M328 236 q-6 -10 0 -18 M338 238 q-6 -8 0 -16" stroke="#bff0b2" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

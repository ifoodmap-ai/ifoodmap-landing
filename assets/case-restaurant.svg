    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="url(#rGlow)"/>
  <rect x="0" y="232" width="480" height="68" fill="#dce6d9"/>

  <!-- storefront facade -->
  <rect x="70" y="70" width="340" height="170" rx="8" fill="#F6F8F5"/>
  <rect x="70" y="70" width="340" height="14" rx="7" fill="#1f9e4e"/>

  <!-- awning -->
  <g>
    <path d="M64 84 L416 84 L416 116 Q400 130 384 116 Q368 130 352 116 Q336 130 320 116 Q304 130 288 116 Q272 130 256 116 Q240 130 224 116 Q208 130 192 116 Q176 130 160 116 Q144 130 128 116 Q112 130 96 116 Q80 130 64 116 Z" fill="#46c138"/>
    <path d="M96 84 L96 116 M128 84 L128 116 M160 84 L160 116 M192 84 L192 116 M224 84 L224 116 M256 84 L256 116 M288 84 L288 116 M320 84 L320 116 M352 84 L352 116 M384 84 L384 116" stroke="#bff0b2" stroke-width="14" opacity="0.5"/>
  </g>

  <!-- window left -->
  <rect x="92" y="140" width="120" height="92" rx="6" fill="#e3f6dd"/>
  <rect x="92" y="140" width="120" height="92" rx="6" fill="none" stroke="#cfe0c8" stroke-width="3"/>
  <line x1="152" y1="140" x2="152" y2="232" stroke="#cfe0c8" stroke-width="3"/>
  <line x1="92" y1="186" x2="212" y2="186" stroke="#cfe0c8" stroke-width="3"/>

  <!-- door / sign -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <radialGradient id="fSun" cx="78%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#fdf3c4"/>
      <stop offset="100%" stop-color="#e3f6dd"/>
    </radialGradient>
  </defs>
  <!-- sky background full bleed -->
  <rect width="480" height="300" fill="#e3f6dd"/>
  <rect width="480" height="300" fill="url(#fSun)" opacity="0.8"/>

  <!-- sun -->
  <circle cx="378" cy="64" r="34" fill="#f4b740" opacity="0.85"/>
  <circle cx="378" cy="64" r="46" fill="#f4b740" opacity="0.18"/>

  <!-- distant field hills -->
  <path d="M0 168 Q120 138 240 158 Q360 178 480 150 L480 200 L0 200 Z" fill="#7cf06b"/>
  <path d="M0 186 Q140 162 300 182 Q400 194 480 176 L480 230 L0 230 Z" fill="#46c138"/>
  <!-- crop rows -->
  <g stroke="#1f9e4e" stroke-width="2" opacity="0.45">
    <path d="M40 210 Q240 196 460 206"/>
    <path d="M30 222 Q240 208 470 218"/>
  </g>
  <!-- ground -->
  <rect x="0" y="226" width="480" height="74" fill="#1f9e4e"/>
  <rect x="0" y="226" width="480" height="10" fill="#3DAE2B"/>

  <!-- crate of vegetables (left) -->
  <g transform="translate(40,196)">
    <rect x="0" y="22" width="120" height="56" rx="6" fill="#c9b18a"/>
    <rect x="0" y="22" width="120" height="56" rx="6" fill="none" stroke="#b89c6f" stroke-width="3"/>
    <line x1="40" y1="22" x2="40" y2="78" stroke="#b89c6f" stroke-width="3"/>
    <line x1="80" y1="22" x2="80" y2="78" stroke="#b89c6f" stroke-width="3"/>
    <!-- produce mound -->
    <circle cx="22" cy="20" r="15" fill="#e2563b"/>
    <circle cx="50" cy="16" r="16" fill="#46c138"/>
    <path d="M40 6 q10 -8 20 0 q-8 8 -20 4 z" fill="#1f9e4e"/>
    <circle cx="80" cy="20" r="15" fill="#e8843c"/>
    <circle cx="104" cy="22" r="13" fill="#f4b740"/>
    <!-- carrot tops -->
    <path d="M76 8 l-4 -14 M82 8 l0 -16 M88 8 l5 -13" stroke="#3DAE2B" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- green crate of fruit (right) -->
  <g transform="translate(300,206)">
    <rect x="0" y="20" width="128" height="58" rx="6" fill="#1f9e4e"/>
    <rect x="6" y="26" width="116" height="46" rx="4" fill="#46c138"/>
    <line x1="46" y1="26" x2="46" y2="72" stroke="#1f9e4e" stroke-width="3"/>
    <line x1="86" y1="26" x2="86" y2="72" stroke="#1f9e4e" stroke-width="3"/>
    <!-- fruit -->
    <circle cx="26" cy="18" r="16" fill="#e2563b"/>
    <circle cx="58" cy="14" r="17" fill="#f4b740"/>
    <circle cx="92" cy="18" r="16" fill="#e8843c"/>
    <circle cx="116" cy="20" r="13" fill="#e2563b"/>
    <path d="M52 0 q8 -8 14 0 q-6 6 -14 2 z" fill="#1f9e4e"/>
    <path d="M22 4 q6 -6 10 0" stroke="#1f9e4e" stroke-width="3" fill="none"/>
  </g>

  <!-- a single leafy sprig accent center -->
  <g transform="translate(228,210)">
    <path d="M0 30 L0 0" stroke="#1f9e4e" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 8 q-16 -4 -22 -16 q16 -2 22 8 z" fill="#7cf06b"/>
    <path d="M0 18 q16 -4 22 -16 q-16 -2 -22 8 z" fill="#46c138"/>
  </g>
</svg>
